  # ── external public repos (release-only, polled daily) ───────────
  # These aren't owned by us, so we can't add notify.yml to them.
  # scripts/poll_releases.py checks them on a cron and posts new
  # releases to the channel. `channel: true` allows thread_id to be
  # omitted (channels have no topics).

  ext-opencode:
