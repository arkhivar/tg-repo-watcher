# tg-repo-watcher config
#
# A project has ONE of:
#   (a) legacy single destination:
#         chat_id: -100...
#         thread_id: 12
#   (b) multiple destinations:
#         destinations:
#           - chat_id: -100...
#             thread_id: 12
#           - chat_id: -100...
#             thread_id: 39
#
# trigger = "webhook" (repo dispatches) or "cron" (external, polled)

projects:

  # ── existing (thread IDs already set) ────────────────────────────

  tg-repo-watcher:
    repo: arkhivar/tg-repo-watcher
    chat_id: -1003947505610
    thread_id: 10
    trigger: webhook

