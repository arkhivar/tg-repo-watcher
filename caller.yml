# Drop this file into EACH watched repo at:
#   .github/workflows/notify.yml
#
# It fires a repository_dispatch event at arkhivar/tg-repo-watcher, which
# owns all the secrets. Each watched repo only needs ONE secret of its
# own: WATCHER_DISPATCH_PAT (a Classic PAT with `repo` scope).
#
# ⚠️  FORKING THIS PROJECT?
# Edit the `owner:` and `repo:` values in the script block below to point
# at YOUR fork — otherwise dispatches go to arkhivar's watcher, not yours.

name: Notify Telegram

on:
  push:
  pull_request:
    types: [opened, reopened, closed, ready_for_review]
  release:
    types: [published]
  issues:
    types: [opened, closed, reopened]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Send dispatch to tg-repo-watcher
        uses: actions/github-script@v7
        with:
          # WATCHER_DISPATCH_PAT must be a secret in THIS repo, containing a
          # PAT with `repo` scope on arkhivar/tg-repo-watcher.
          # (See README for the one-secret-per-repo setup step.)
          github-token: ${{ secrets.WATCHER_DISPATCH_PAT }}
          script: |
            const event = context.eventName;
            const payload = {
              repo: `${context.repo.owner}/${context.repo.repo}`,
              event,
              ref: context.ref,
              sha: context.sha,
              actor: context.actor,
            };
            if (event === 'push') {
              payload.before = context.payload.before;
              payload.after  = context.payload.after;
            } else if (event === 'pull_request') {
              payload.action    = context.payload.action;
              payload.pr_number = context.payload.pull_request.number;
              payload.merged    = context.payload.pull_request.merged;
            } else if (event === 'release') {
              payload.action     = context.payload.action;
              payload.release_id = context.payload.release.id;
            } else if (event === 'issues') {
              payload.action       = context.payload.action;
              payload.issue_number = context.payload.issue.number;
            }
            await github.rest.repos.createDispatchEvent({
              owner: 'arkhivar',
              repo:  'tg-repo-watcher',
              event_type: 'repo-update',
              client_payload: payload,
            });
